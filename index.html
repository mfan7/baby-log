<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Baby Log</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f7; color: #1c1c1e; }

    .container { max-width: 480px; margin: 0 auto; padding: 16px; }

    /* Auth */
    .auth { max-width: 480px; margin: 0 auto; padding: 60px 24px; text-align: center; }
    .auth h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .auth p { color: #6e6e73; margin-bottom: 28px; font-size: 15px; }
    .auth input { width: 100%; padding: 14px; border: 1.5px solid #e5e5ea; border-radius: 12px; font-size: 16px; margin-bottom: 12px; }
    .auth input:focus { outline: none; border-color: #007aff; }

    /* Top bar */
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-top: 8px; }
    .top-bar h1 { font-size: 24px; font-weight: 700; }
    .logout-btn { font-size: 14px; color: #007aff; background: none; border: none; cursor: pointer; padding: 4px; }

    /* Stats card */
    .stats-card { background: white; border-radius: 14px; padding: 14px 16px; margin-bottom: 20px; }
    .stats-card .stats-title { font-size: 11px; font-weight: 700; color: #aeaeb2; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
    .stats-row { display: flex; gap: 0; }
    .stat-col { flex: 1; padding: 4px 0; }
    .stat-col + .stat-col { border-left: 1px solid #f2f2f7; padding-left: 14px; margin-left: 14px; }
    .stat-icon { font-size: 15px; margin-bottom: 3px; }
    .stat-value { font-size: 17px; font-weight: 700; color: #1c1c1e; line-height: 1.2; }
    .stat-label { font-size: 11px; color: #aeaeb2; margin-top: 2px; }
    .stat-sub { font-size: 11px; color: #6e6e73; margin-top: 3px; }

    /* Type selector */
    .type-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .type-btn { flex: 1; padding: 14px 6px; border: 2px solid #e5e5ea; border-radius: 12px; background: white; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; line-height: 1.4; }
    .type-btn.active { border-color: #007aff; background: #eef4ff; color: #007aff; }

    /* Fields */
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 700; color: #6e6e73; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.6px; }
    input[type=number], input[type=datetime-local], textarea {
      width: 100%; padding: 13px; border: 1.5px solid #e5e5ea; border-radius: 10px;
      font-size: 16px; background: white; -webkit-appearance: none; font-family: inherit;
    }
    input:focus, textarea:focus { outline: none; border-color: #007aff; }

    /* Checkboxes */
    .check-row { display: flex; gap: 10px; }
    .check-item { flex: 1; display: flex; align-items: center; gap: 10px; padding: 13px; border: 1.5px solid #e5e5ea; border-radius: 10px; background: white; cursor: pointer; user-select: none; }
    .check-item.checked { border-color: #007aff; background: #eef4ff; }
    .check-item input[type=checkbox] { width: 20px; height: 20px; accent-color: #007aff; flex-shrink: 0; pointer-events: none; }
    .check-item span { font-size: 15px; font-weight: 500; }

    /* Diaper radio */
    .radio-row { display: flex; gap: 8px; }
    .radio-item { flex: 1; padding: 13px 8px; border: 1.5px solid #e5e5ea; border-radius: 10px; background: white; text-align: center; cursor: pointer; font-size: 14px; font-weight: 500; user-select: none; }
    .radio-item.selected { border-color: #007aff; background: #eef4ff; color: #007aff; }

    /* Amount row */
    .amount-row { display: flex; gap: 12px; }
    .amount-row .field { flex: 1; }

    /* Buttons */
    .submit-btn { width: 100%; padding: 16px; background: #007aff; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 4px; font-family: inherit; }
    .submit-btn:active { background: #0051d5; }
    .submit-btn:disabled { background: #aeaeb2; }

    /* Toast */
    .toast { position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%); background: #1c1c1e; color: white; padding: 11px 22px; border-radius: 20px; font-size: 15px; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; z-index: 100; }
    .toast.show { opacity: 1; }

    /* Recent */
    .recent { margin-top: 28px; padding-bottom: 40px; }
    .recent h2 { font-size: 12px; font-weight: 700; color: #6e6e73; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
    .log-item { background: white; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
    .log-item .log-type { font-size: 14px; font-weight: 600; color: #007aff; }
    .log-item .log-time { color: #aeaeb2; font-size: 12px; margin-top: 2px; }
    .log-item .log-detail { color: #3a3a3c; font-size: 13px; margin-top: 3px; }
    .no-logs { color: #aeaeb2; font-size: 14px; text-align: center; padding: 20px 0; }

    /* Chart card */
    .chart-card { background: white; border-radius: 14px; padding: 14px 16px 16px; margin-bottom: 20px; }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .chart-title { font-size: 11px; font-weight: 700; color: #aeaeb2; text-transform: uppercase; letter-spacing: 0.6px; }
    .chart-toggle { display: flex; gap: 0; border: 1.5px solid #e5e5ea; border-radius: 8px; overflow: hidden; }
    .chart-toggle button { padding: 5px 12px; border: none; background: white; font-size: 12px; font-weight: 600; color: #6e6e73; cursor: pointer; }
    .chart-toggle button.active { background: #007aff; color: white; }
    .chart-legend { display: flex; gap: 14px; margin-bottom: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #6e6e73; }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    .hidden { display: none !important; }
    .error-msg { color: #ff3b30; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>

  <!-- Auth screen -->
  <div id="auth-screen" class="auth">
    <h1>Baby Log</h1>
    <p>Sign in to continue</p>
    <input type="email" id="email-input" placeholder="your@email.com" autocomplete="email">
    <input type="password" id="password-input" placeholder="Password (if set)" autocomplete="current-password" style="width:100%;padding:14px;border:1.5px solid #e5e5ea;border-radius:12px;font-size:16px;margin-bottom:12px;display:block;">
    <button class="submit-btn" id="signin-btn" onclick="signInWithPassword()" style="margin-bottom:10px;">Sign In</button>
    <button class="submit-btn" id="magic-btn" onclick="sendMagicLink()" style="background:#f2f2f7;color:#007aff;">Send Magic Link</button>
    <p id="auth-msg" style="margin-top:14px;color:#6e6e73;font-size:14px;"></p>
  </div>

  <!-- Main app -->
  <div id="app-screen" class="container hidden">
    <div class="top-bar">
      <h1>Baby Log</h1>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>

    <!-- Today's summary -->
    <div class="stats-card">
      <div class="stats-title">Today</div>
      <div class="stats-row">
        <div class="stat-col">
          <div class="stat-icon">🍼</div>
          <div class="stat-value" id="stat-formula">—</div>
          <div class="stat-label">formula</div>
          <div class="stat-sub" id="stat-solid-sub"></div>
          <div class="stat-sub" id="stat-feed-last"></div>
        </div>
        <div class="stat-col">
          <div class="stat-icon">🚼</div>
          <div class="stat-value" id="stat-diapers">—</div>
          <div class="stat-label">diapers</div>
          <div class="stat-sub" id="stat-diaper-detail"></div>
          <div class="stat-sub" id="stat-diaper-last"></div>
        </div>
        <div class="stat-col">
          <div class="stat-icon">🤗</div>
          <div class="stat-value" id="stat-soothe">—</div>
          <div class="stat-label">soothe</div>
          <div class="stat-sub" id="stat-soothe-last"></div>
        </div>
      </div>
    </div>

    <!-- Feeding chart -->
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Feeding Trends</span>
        <div class="chart-toggle">
          <button id="toggle-week" class="active" onclick="setChartMode('week')">This Week</button>
          <button id="toggle-byweek" onclick="setChartMode('byweek')">By Week</button>
        </div>
      </div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#4a9eff"></div>Formula (ml)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#34c759"></div>Solid (g)</div>
      </div>
      <canvas id="feed-chart" height="160"></canvas>
      <p id="chart-empty" style="text-align:center;color:#aeaeb2;font-size:13px;padding:20px 0;display:none;">No feeding data yet</p>
    </div>

    <!-- Type buttons -->
    <div class="type-row">
      <button class="type-btn active" onclick="setType('feed')"   id="btn-feed">🍼<br>Feed</button>
      <button class="type-btn"        onclick="setType('diaper')" id="btn-diaper">🚼<br>Diaper</button>
      <button class="type-btn"        onclick="setType('soothe')" id="btn-soothe">🤗<br>Soothe</button>
    </div>

    <!-- Feed fields -->
    <div id="feed-fields">
      <div class="field">
        <label>What was given</label>
        <div class="check-row">
          <div class="check-item" id="check-formula" onclick="toggleCheck('formula')">
            <input type="checkbox" id="cb-formula">
            <span>Formula</span>
          </div>
          <div class="check-item" id="check-solid" onclick="toggleCheck('solid')">
            <input type="checkbox" id="cb-solid">
            <span>Solid</span>
          </div>
        </div>
      </div>
      <div class="amount-row">
        <div class="field" id="field-ml">
          <label>Formula (ml)</label>
          <input type="number" id="amount-ml" placeholder="120" min="0" max="500">
        </div>
        <div class="field" id="field-g">
          <label>Solid (g)</label>
          <input type="number" id="amount-g" placeholder="30" min="0" max="500">
        </div>
      </div>
    </div>

    <!-- Diaper fields -->
    <div id="diaper-fields" class="hidden">
      <div class="field">
        <label>Type</label>
        <div class="radio-row">
          <div class="radio-item selected" id="radio-wet"   onclick="setDiaper('wet')">Wet</div>
          <div class="radio-item"          id="radio-dirty" onclick="setDiaper('dirty')">Dirty</div>
          <div class="radio-item"          id="radio-both"  onclick="setDiaper('both')">Both</div>
        </div>
      </div>
    </div>

    <!-- Soothe fields (notes only — shared below) -->
    <div id="soothe-fields" class="hidden"></div>

    <!-- Shared fields -->
    <div class="field">
      <label>Time</label>
      <input type="datetime-local" id="logged-at">
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <textarea id="notes" rows="2" placeholder="e.g. refused last 20ml, seemed gassy" style="resize:none;"></textarea>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitLog()">Save</button>

    <!-- Recent entries -->
    <div class="recent">
      <h2>Recent</h2>
      <div id="recent-list"><p class="no-logs">Loading…</p></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SUPABASE_URL = 'https://nxggytczmjaextwxrfrq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54Z2d5dGN6bWphZXh0d3hyZnJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxODMzMTIsImV4cCI6MjA5MTc1OTMxMn0.gZSZqPxs7sJGa8f6nIap8QVD3cIpoUojjVmXfjvl4R4';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentType = 'feed';
    let diaperType  = 'wet';
    let currentUser = null;

    // ── Auth ──────────────────────────────────────────────────────────────────

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (session) showApp(session.user);

      sb.auth.onAuthStateChange((_, session) => {
        if (session) showApp(session.user);
        else         showAuth();
      });
    }

    async function signInWithPassword() {
      const email    = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value;
      if (!email || !password) { document.getElementById('auth-msg').textContent = 'Enter email and password.'; return; }
      const btn = document.getElementById('signin-btn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) document.getElementById('auth-msg').textContent = '⚠ ' + error.message;
      btn.disabled = false; btn.textContent = 'Sign In';
    }

    async function sendMagicLink() {
      const email = document.getElementById('email-input').value.trim();
      if (!email) return;
      const btn = document.getElementById('magic-btn');
      btn.disabled = true; btn.textContent = 'Sending…';
      const { error } = await sb.auth.signInWithOtp({
        email,
        options: { shouldCreateUser: true }
      });
      document.getElementById('auth-msg').textContent = error
        ? '⚠ ' + error.message
        : '✓ Check your email for the magic link.';
      btn.disabled = false; btn.textContent = 'Send Magic Link';
    }

    async function logout() {
      await sb.auth.signOut();
    }

    function showApp(user) {
      currentUser = user;
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('app-screen').classList.remove('hidden');
      setDefaultTime();
      loadStats();
      loadChart();
      loadRecent();
    }

    function showAuth() {
      currentUser = null;
      document.getElementById('app-screen').classList.add('hidden');
      document.getElementById('auth-screen').classList.remove('hidden');
    }

    // ── Type switching ────────────────────────────────────────────────────────

    function setType(type) {
      currentType = type;
      ['feed', 'diaper', 'soothe'].forEach(t => {
        document.getElementById(`btn-${t}`).classList.toggle('active', t === type);
        document.getElementById(`${t}-fields`).classList.toggle('hidden', t !== type);
      });
    }

    function setDiaper(type) {
      diaperType = type;
      ['wet', 'dirty', 'both'].forEach(t =>
        document.getElementById(`radio-${t}`).classList.toggle('selected', t === type)
      );
    }

    function toggleCheck(which) {
      const cb = document.getElementById(`cb-${which}`);
      cb.checked = !cb.checked;
      document.getElementById(`check-${which}`).classList.toggle('checked', cb.checked);
      // Show/hide amount inputs based on checked state
      document.getElementById('field-ml').classList.toggle('hidden', !document.getElementById('cb-formula').checked);
      document.getElementById('field-g').classList.toggle('hidden',  !document.getElementById('cb-solid').checked);
    }

    // ── Time ──────────────────────────────────────────────────────────────────

    function setDefaultTime() {
      const now = new Date();
      now.setSeconds(0, 0);
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
        .toISOString().slice(0, 16);
      document.getElementById('logged-at').value = local;
    }

    // ── Submit ────────────────────────────────────────────────────────────────

    async function submitLog() {
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'Saving…';

      const loggedAtVal = document.getElementById('logged-at').value;
      const notes = document.getElementById('notes').value.trim() || null;

      let row = {
        user_id:    currentUser.id,
        logged_at:  new Date(loggedAtVal).toISOString(),
        had_formula: false,
        had_solid:   false,
        notes,
      };

      if (currentType === 'feed') {
        const hadFormula = document.getElementById('cb-formula').checked;
        const hadSolid   = document.getElementById('cb-solid').checked;
        if (!hadFormula && !hadSolid) {
          showToast('Select formula or solid'); btn.disabled = false; btn.textContent = 'Save'; return;
        }
        Object.assign(row, {
          type:        'feed',
          had_formula: hadFormula,
          had_solid:   hadSolid,
          amount_ml:   hadFormula ? (parseInt(document.getElementById('amount-ml').value) || null) : null,
          amount_g:    hadSolid   ? (parseInt(document.getElementById('amount-g').value)  || null) : null,
        });
      } else if (currentType === 'diaper') {
        row.type = `diaper_${diaperType}`;
      } else {
        row.type = 'soothe';
      }

      const { error } = await sb.from('care_logs').insert(row);
      if (error) {
        showToast('Error: ' + error.message);
      } else {
        showToast('Saved');
        resetForm();
        loadStats();
        loadChart();
        loadRecent();
      }
      btn.disabled = false; btn.textContent = 'Save';
    }

    function resetForm() {
      document.getElementById('notes').value = '';
      document.getElementById('amount-ml').value = '';
      document.getElementById('amount-g').value = '';
      ['formula', 'solid'].forEach(w => {
        document.getElementById(`cb-${w}`).checked = false;
        document.getElementById(`check-${w}`).classList.remove('checked');
      });
      document.getElementById('field-ml').classList.remove('hidden');
      document.getElementById('field-g').classList.remove('hidden');
      setDiaper('wet');
      setDefaultTime();
    }

    // ── Stats ─────────────────────────────────────────────────────────────────

    function agoStr(dateStr) {
      if (!dateStr) return null;
      const mins = Math.round((Date.now() - new Date(dateStr)) / 60000);
      if (mins < 1)   return 'just now';
      if (mins < 60)  return `${mins}m ago`;
      const h = Math.floor(mins / 60), m = mins % 60;
      return m > 0 ? `${h}h ${m}m ago` : `${h}h ago`;
    }

    async function loadStats() {
      // Start of today in local time
      const todayStart = new Date();
      todayStart.setHours(0, 0, 0, 0);

      const { data } = await sb.from('care_logs')
        .select('*')
        .gte('logged_at', todayStart.toISOString())
        .order('logged_at', { ascending: false });

      if (!data) return;

      // Feed stats
      const feeds = data.filter(r => r.type === 'feed');
      const totalMl  = feeds.reduce((s, r) => s + (r.amount_ml || 0), 0);
      const totalG   = feeds.reduce((s, r) => s + (r.amount_g  || 0), 0);
      const lastFeed = feeds[0]?.logged_at;
      document.getElementById('stat-formula').textContent  = totalMl > 0 ? `${totalMl}ml` : (feeds.length > 0 ? `${feeds.length}×` : '—');
      document.getElementById('stat-solid-sub').textContent = totalG  > 0 ? `+ ${totalG}g solid` : '';
      document.getElementById('stat-feed-last').textContent = lastFeed ? agoStr(lastFeed) : (feeds.length === 0 ? 'none today' : '');

      // Diaper stats
      const diapers    = data.filter(r => r.type.startsWith('diaper'));
      const wetCount   = diapers.filter(r => r.type === 'diaper_wet'   || r.type === 'diaper_both').length;
      const dirtyCount = diapers.filter(r => r.type === 'diaper_dirty' || r.type === 'diaper_both').length;
      const lastDiaper = diapers[0]?.logged_at;
      document.getElementById('stat-diapers').textContent       = diapers.length > 0 ? `${diapers.length}×` : '—';
      document.getElementById('stat-diaper-detail').textContent = diapers.length > 0 ? `${wetCount} wet · ${dirtyCount} dirty` : '';
      document.getElementById('stat-diaper-last').textContent   = lastDiaper ? agoStr(lastDiaper) : (diapers.length === 0 ? 'none today' : '');

      // Soothe stats
      const soothes   = data.filter(r => r.type === 'soothe');
      const lastSoothe = soothes[0]?.logged_at;
      document.getElementById('stat-soothe').textContent      = soothes.length > 0 ? `${soothes.length}×` : '—';
      document.getElementById('stat-soothe-last').textContent = lastSoothe ? agoStr(lastSoothe) : (soothes.length === 0 ? 'none today' : '');
    }

    // ── Recent logs ───────────────────────────────────────────────────────────

    async function loadRecent() {
      const { data } = await sb.from('care_logs')
        .select('*')
        .order('logged_at', { ascending: false })
        .limit(5);

      const list = document.getElementById('recent-list');
      if (!data || data.length === 0) {
        list.innerHTML = '<p class="no-logs">No entries yet</p>'; return;
      }
      list.innerHTML = data.map(r => {
        const time = new Date(r.logged_at).toLocaleString([], {
          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });
        let detail = '';
        if (r.type === 'feed') {
          const parts = [];
          if (r.had_formula) parts.push('Formula' + (r.amount_ml ? ' ' + r.amount_ml + 'ml' : ''));
          if (r.had_solid)   parts.push('Solid'   + (r.amount_g  ? ' ' + r.amount_g  + 'g'  : ''));
          detail = parts.join(' + ');
        } else if (r.type.startsWith('diaper')) {
          const sub = r.type.replace('diaper_', '');
          detail = sub.charAt(0).toUpperCase() + sub.slice(1);
        }
        if (r.notes) detail += (detail ? ' · ' : '') + r.notes;
        return `
          <div class="log-item">
            <div class="log-type">${typeLabel(r.type)}</div>
            <div class="log-time">${time}</div>
            ${detail ? `<div class="log-detail">${detail}</div>` : ''}
          </div>`;
      }).join('');
    }

    const TYPE_LABELS = {
      feed: '🍼 Feed', diaper_wet: '🚼 Wet', diaper_dirty: '🚼 Dirty',
      diaper_both: '🚼 Wet + Dirty', soothe: '🤗 Soothe'
    };
    const typeLabel = t => TYPE_LABELS[t] || t;

    // ── Chart ─────────────────────────────────────────────────────────────────

    let feedChart = null;
    let chartMode = 'week'; // 'week' | 'byweek'

    function setChartMode(mode) {
      chartMode = mode;
      document.getElementById('toggle-week').classList.toggle('active', mode === 'week');
      document.getElementById('toggle-byweek').classList.toggle('active', mode === 'byweek');
      loadChart();
    }

    function dateKey(d) {
      return d.toISOString().slice(0, 10); // YYYY-MM-DD
    }

    function weekKey(d) {
      // ISO week start (Monday)
      const day = new Date(d);
      day.setHours(0, 0, 0, 0);
      day.setDate(day.getDate() - ((day.getDay() + 6) % 7));
      return dateKey(day);
    }

    async function loadChart() {
      // Fetch last 8 weeks of feed data
      const since = new Date();
      since.setDate(since.getDate() - 56);
      const { data } = await sb.from('care_logs')
        .select('logged_at, amount_ml, amount_g')
        .eq('type', 'feed')
        .gte('logged_at', since.toISOString())
        .order('logged_at', { ascending: true });

      if (!data || data.length === 0) {
        document.getElementById('feed-chart').style.display = 'none';
        document.getElementById('chart-empty').style.display = 'block';
        return;
      }
      document.getElementById('feed-chart').style.display = 'block';
      document.getElementById('chart-empty').style.display = 'none';

      let labels, formulaVals, solidVals;

      if (chartMode === 'week') {
        // Last 7 days, one bar per day
        const days = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date(); d.setDate(d.getDate() - i); d.setHours(0,0,0,0);
          days.push(d);
        }
        labels      = days.map(d => d.toLocaleDateString([], { weekday: 'short', month: 'numeric', day: 'numeric' }));
        formulaVals = days.map(d => 0);
        solidVals   = days.map(d => 0);
        data.forEach(r => {
          const rDate = new Date(r.logged_at); rDate.setHours(0,0,0,0);
          const idx = days.findIndex(d => d.getTime() === rDate.getTime());
          if (idx >= 0) {
            formulaVals[idx] += r.amount_ml || 0;
            solidVals[idx]   += r.amount_g  || 0;
          }
        });
      } else {
        // By week: last 6 weeks, avg per day in each week
        const weekMap = {}; // weekKey → { mlTotal, gTotal, days: Set }
        data.forEach(r => {
          const wk = weekKey(new Date(r.logged_at));
          if (!weekMap[wk]) weekMap[wk] = { mlTotal: 0, gTotal: 0, days: new Set() };
          weekMap[wk].mlTotal += r.amount_ml || 0;
          weekMap[wk].gTotal  += r.amount_g  || 0;
          weekMap[wk].days.add(dateKey(new Date(r.logged_at)));
        });
        const weeks = Object.keys(weekMap).sort().slice(-6);
        labels      = weeks.map(wk => { const d = new Date(wk); return `W ${d.getMonth()+1}/${d.getDate()}`; });
        formulaVals = weeks.map(wk => Math.round(weekMap[wk].mlTotal / weekMap[wk].days.size));
        solidVals   = weeks.map(wk => Math.round(weekMap[wk].gTotal  / weekMap[wk].days.size));
      }

      const ctx = document.getElementById('feed-chart').getContext('2d');
      if (feedChart) feedChart.destroy();
      feedChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'Formula (ml)', data: formulaVals, backgroundColor: '#4a9eff', borderRadius: 4, stack: 'feed' },
            { label: 'Solid (g)',    data: solidVals,   backgroundColor: '#34c759', borderRadius: 4, stack: 'feed' },
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false }, tooltip: {
            callbacks: {
              label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + (ctx.datasetIndex === 0 ? 'ml' : 'g')
            }
          }},
          scales: {
            x: { stacked: true, grid: { display: false }, ticks: { font: { size: 11 }, maxRotation: 45 } },
            y: { stacked: true, grid: { color: '#f2f2f7' }, ticks: { font: { size: 11 } },
                 title: { display: true, text: 'ml / g', font: { size: 10 }, color: '#aeaeb2' } }
          }
        }
      });
    }

    // ── Toast ─────────────────────────────────────────────────────────────────

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    init();
  </script>
</body>
</html>
